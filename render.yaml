# Render Blueprint — https://render.com/docs/blueprint-spec
# This file tells Render how to build and run the AgriFlow backend.

services:
  - type: web
    name: agriflow-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agriflow-db
          property: connectionURI
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: agriflow-db
    plan: free
    region: oregon
